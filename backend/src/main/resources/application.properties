spring.application.name=practice

spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:issue_tracker}
spring.datasource.username=${DB_USERNAME:issuetracker_user}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

jwt.secret=some-long-random-string-that-is-at-least-256-bits-long-for-hs256-to-be-secure
jwt.expiration=86400
server.port=${PORT:8080}
